default_install_hook_types:
  - pre-commit
  - commit-msg
default_stages:
  - pre-commit
exclude: ^(node_modules|dist|coverage|docs/(build|\.docusaurus)|\.ai-rulez/cache)/
repos:
  - repo: https://github.com/Goldziher/gitfluff
    rev: v0.8.0
    hooks:
      - id: gitfluff-lint
        args:
          - --write
        stages:
          - commit-msg
  - repo: https://github.com/kreuzberg-dev/pre-commit-hooks
    rev: v1.2.3
    hooks:
      - id: ai-rulez-generate
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args:
          - --maxkb=1000
        exclude: ^(pnpm-lock\.yaml|docs/pnpm-lock\.yaml)$
      - id: detect-private-key
      - id: check-json
      - id: check-yaml
        args:
          - --allow-multiple-documents
          - --unsafe
      - id: check-toml
      - id: check-case-conflict
      - id: actionlint
      - id: gh-actions-updater
      - id: oxlint
      - id: oxfmt
      - id: rumdl-fmt
      - id: typos
        args:
          - --force-exclude
