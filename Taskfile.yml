version: "3"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  setup:
    desc: Install dependencies and git hooks
    cmds:
      - pnpm install
      - prek install
      - prek install --hook-type commit-msg

  update:
    desc: Update dependencies, pre-commit hooks, and AI rules
    cmds:
      - pnpm up --latest -r
      - prek autoupdate
      - pnpm ai-rulez generate

  lint:
    desc: Run all prek hooks
    cmds:
      - prek run --all-files

  format:
    desc: Format JavaScript, TypeScript, JSON, and CSS
    cmds:
      - prek run oxfmt --all-files

  typecheck:
    desc: Type-check the package
    cmds:
      - pnpm typecheck

  test:
    desc: Run tests
    cmds:
      - pnpm test

  build:
    desc: Build the package
    cmds:
      - pnpm build

  docs:build:
    desc: Build documentation
    cmds:
      - pnpm docs:build

  validate:
    desc: Run CI-equivalent validation
    cmds:
      - task: lint
      - task: typecheck
      - task: test
      - task: build
      - task: docs:build
